
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title></title>

<link href="https://fonts.googleapis.com/css2?family=Limelight&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>


<!-- BOOT SCREEN -->

<div id="bootScreen">

<div id="bootText">

<span>OPENING</span>
<span>THE</span>
<span>VAULT</span>

</div>

</div>



<!-- DASHBOARD -->

<div id="dashboard">

<header>
<h1>ZENITHRA HARDWARE DASHBOARD</h1>
</header>



<!-- CAMERA PANEL -->

<div class="panel camera">

<h3>CAMERA FEED</h3>

<div class="screen">

<video id="video" autoplay muted></video>

<div id="liveBadge" style="
position:absolute;
top:10px;
left:10px;
background:#8F755E;
color:#231A16;
padding:3px 8px;
font-size:12px;
display:none;
border-radius:3px;">
LIVE
</div>

</div>

<button id="cameraBtn" onclick="toggleCamera()">Start Camera</button>

</div>



<!-- VOICE PANEL -->

<div class="panel">

<h3>VOICE RECOGNITION</h3>

<p id="status">Status: Idle</p>

<div id="speechOutput">
No output yet.
</div>

<button id="voiceBtn" onclick="toggleVoice()">Listen</button>

</div>



<!-- BLUETOOTH PANEL -->

<div class="panel">

<h3>BLUETOOTH</h3>

<p id="btStatus">Disconnected</p>

<p id="deviceName">No Device</p>

<button onclick="connectBluetooth()">Scan</button>

</div>


</div>


<script src="script.js"></script>

</body>
</html>
